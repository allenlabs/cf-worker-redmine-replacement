name = "webhook-relay"
main = "index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Queue consumer — picks up RelayJobs produced by the ingest worker.
[[queues.consumers]]
queue = "webhook-events"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "webhook-events-dlq"

# Cloudflare Workflows binding for per-event retry orchestration.
[[workflows]]
binding = "RELAY_WORKFLOW"
name = "webhook-relay-workflow"
class_name = "RelayWorkflow"

[vars]
USER_AGENT = "cf-webhook-relay/0.1"
