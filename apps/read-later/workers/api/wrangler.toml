name = "read-later-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: let Cloudflare relocate this worker near the data it talks
# to (Hyperdrive → Hetzner Postgres in Helsinki), turning the many cross-
# continent query round-trips per request into in-region hops.
[placement]
mode = "smart"
workers_dev = true

[[routes]]
pattern = "read-later-api.allenlabs.org"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB, `read_later` schema).
# Reuses the same Hyperdrive binding as read-later-web + every other
# allenlabs app.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

[vars]
APP_NAME = "Read Later API"
PUBLIC_BASE_URL = "https://read-later-api.allenlabs.org"

# Secrets — set with `wrangler secret put …`:
#   OTEL_BEARER_TOKEN
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
#
# The HMAC secrets themselves live in read_later.api_clients (one per
# client_id), not as wrangler secrets — they're per-client and rotated via
# UPDATE.
