name = "nudge-cron"
main = "index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Every minute — scans nudge.reminders for fire_at <= now and delivers.
[triggers]
crons = ["*/1 * * * *"]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

[vars]
APP_NAME = "Nudge Cron"
INBOX_API_URL = "https://inbox-api.allen.company"
CRON_MAX_REMINDERS = "500"
PUBLIC_WEB_URL = "https://nudge.allenlabs.org/"

# Secrets:
#   OTEL_BEARER_TOKEN
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
#   INBOX_HMAC_SECRET     (shared secret with inbox-api fan-out)
#   INBOX_HMAC_CLIENT_ID  (paired client_id for the secret above)
