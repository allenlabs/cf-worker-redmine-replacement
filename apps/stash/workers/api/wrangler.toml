name = "stash-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "stash-api.allen.company"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB, `stash` schema).
# Reuses the same Hyperdrive binding as stash-web + focus + inbox + pm-web.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

[vars]
APP_NAME = "Stash API"
PUBLIC_BASE_URL = "https://stash-api.allen.company"

# Secrets — set with `wrangler secret put …`:
#   OTEL_BEARER_TOKEN
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
#
# The HMAC secrets themselves live in stash.api_clients (one per client_id),
# not as wrangler secrets — they're per-client and rotated via UPDATE.
