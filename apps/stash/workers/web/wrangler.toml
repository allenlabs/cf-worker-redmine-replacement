name = "stash-web"
# `npm run build` (TanStack Start vite plugin) emits the complete worker
# at dist/server/server.js with all server-fn handlers registered.  We
# bypass @cloudflare/vite-plugin entirely (same rationale as PM / inbox /
# focus / context).
main = "../../dist/server/server.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: let Cloudflare relocate this worker near the data it talks
# to (Hyperdrive → Hetzner Postgres in Helsinki), turning the many cross-
# continent query round-trips per request into in-region hops.
[placement]
mode = "smart"
workers_dev = true

assets = { directory = "../../dist/client", binding = "ASSETS" }

# Custom domain — DNS + SSL handled by Cloudflare since allenlabs.org is on
# the same account.
[[routes]]
pattern = "stash.allenlabs.org"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB, `stash` schema).
# Reuses the shared Hyperdrive binding id used by every allenlabs app.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

# JWT revocation list — moved off Workers KV to the auth D1 in APAC.
# The shared `revoked_sessions` table (apps/auth/migrations-d1/0007_revoked_sessions.sql)
# is bound here as AUTH_DB so verifySessionToken's revocation check sits
# next to auth itself instead of crossing the continent twice per request.
# Bonus: deploy tokens no longer need KV:Edit scope.
[[d1_databases]]
binding = "AUTH_DB"
database_name = "allenlabs-auth-d1"
database_id = "a1ac75db-4a03-4312-98d9-04cee356d0ed"

[vars]
APP_NAME = "Stash"
DEFAULT_LANGUAGE = "en"
AUTH_WEB_URL = "https://auth.allen.company"
AUTH_API_URL = "https://auth-api.allen.company"
PUBLIC_BASE_URL = "https://stash.allenlabs.org"
