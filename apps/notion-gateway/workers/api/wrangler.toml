name = "notion-gateway-api"
main = "src/index.ts"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "notion-api.allen.company"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB, `notion_gateway` schema).
# Reuse the same Hyperdrive binding as PM — same target instance, just
# different schema.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

[vars]
APP_NAME = "Notion Gateway"
PUBLIC_BASE_URL = "https://notion.allen.company"
NOTION_OAUTH_REDIRECT_URI = "https://notion.allen.company/oauth/callback"

# Secrets — set with `wrangler secret put …`:
#   NOTION_CLIENT_ID
#   NOTION_CLIENT_SECRET
#   WORKSPACE_TOKEN_KEY     (32 random bytes, base64)
#   OTEL_BEARER_TOKEN       (reuse PM's value)
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
