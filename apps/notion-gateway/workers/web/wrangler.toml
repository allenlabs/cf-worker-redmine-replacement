name = "notion-gateway-web"
main = "app/server.ts"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: let Cloudflare relocate this worker near the data it talks
# to (Hyperdrive → Hetzner Postgres in Helsinki), turning the many cross-
# continent query round-trips per request into in-region hops.
[placement]
mode = "smart"
workers_dev = true

[[routes]]
pattern = "notion.allen.company"
custom_domain = true

# Same Hyperdrive as the API worker — single PG instance, `notion_gateway` schema.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

[vars]
APP_NAME = "Notion Gateway"
AUTH_API_URL = "https://auth-api.allen.company"
AUTH_WEB_URL = "https://auth.allen.company"
PUBLIC_BASE_URL = "https://notion.allen.company"
NOTION_OAUTH_REDIRECT_URI = "https://notion.allen.company/oauth/callback"

# Secrets — set with `wrangler secret put …`:
#   NOTION_CLIENT_ID
#   NOTION_CLIENT_SECRET
#   WORKSPACE_TOKEN_KEY     (32 random bytes, base64)
#   OTEL_BEARER_TOKEN       (reuse PM's value)
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
