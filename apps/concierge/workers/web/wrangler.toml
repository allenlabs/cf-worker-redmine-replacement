name = "concierge-web"
# `npm run build` (TanStack Start vite plugin) emits the complete worker at
# dist/server/server.js with all server-fn handlers registered.  We bypass
# @cloudflare/vite-plugin entirely (same rationale as PM / inbox / focus /
# context).
main = "../../dist/server/server.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

assets = { directory = "../../dist/client", binding = "ASSETS" }

[[routes]]
pattern = "concierge.allen.company"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB, `concierge` schema).
# Reuses the shared Hyperdrive binding id used by every allenlabs app.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

# KV namespace for session revocation.  Reuse PM's namespace — keys are
# prefixed by hash so cross-app collisions are astronomically unlikely.
[[kv_namespaces]]
binding = "SESSION_KV"
id = "96408ec81e754c36b4ae3643cf2afd80"

[vars]
APP_NAME = "Concierge"
DEFAULT_LANGUAGE = "en"
AUTH_WEB_URL = "https://auth.allen.company"
AUTH_API_URL = "https://auth-api.allen.company"
PUBLIC_BASE_URL = "https://concierge.allen.company"
INBOX_API_URL = "https://inbox-api.allen.company"

# Secrets — set with `wrangler secret put …`:
#   OTEL_BEARER_TOKEN
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
#   LLM_BASE_URL          e.g. https://api.openai.com/v1
#                         TODO(litellm): once local LiteLLM at
#                         127.0.0.1:4000 is exposed via cloudflared tunnel
#                         (e.g. https://llm.allen.company/v1), rotate this
#                         secret in place — no code change needed.
#   LLM_API_KEY           OpenAI / LiteLLM bearer token
#   LLM_MODEL             e.g. gpt-4o-mini
#   INBOX_HMAC_CLIENT_ID  optional (push fan-out)
#   INBOX_HMAC_SECRET     optional (push fan-out)
