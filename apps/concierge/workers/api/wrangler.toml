name = "concierge-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "concierge-api.allenlabs.org"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB, `concierge` schema).
# Reuses the same Hyperdrive binding as concierge-web + every other app.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

[vars]
APP_NAME = "Concierge API"
PUBLIC_BASE_URL = "https://concierge-api.allenlabs.org"
# Where to forward push deliveries.  The inbox API worker owns the user's
# push_subscriptions table and the VAPID transport; concierge POSTs a tiny
# notification payload here and inbox fans it out.
INBOX_API_URL = "https://inbox-api.allenlabs.org"

# Secrets — set with `wrangler secret put …`:
#   OTEL_BEARER_TOKEN
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
#   LLM_BASE_URL        e.g. https://api.openai.com/v1
#                       TODO(litellm): once the user's local LiteLLM at
#                       127.0.0.1:4000 is exposed via cloudflared tunnel
#                       (e.g. https://llm.allen.company/v1), rotate this
#                       secret in place — no code change needed because
#                       the LLM client is plain `fetch` against an
#                       OpenAI-compatible /chat/completions endpoint.
#   LLM_API_KEY         OpenAI / LiteLLM bearer token
#   LLM_MODEL           e.g. gpt-4o-mini
#   INBOX_HMAC_SECRET   shared secret with inbox-api so concierge can sign
#                       the push fan-out POST (uses the same scheme as
#                       inbox.api_clients).  Optional — push delivery is
#                       best-effort.
#   INBOX_HMAC_CLIENT_ID  the X-Client-Id header value paired with INBOX_HMAC_SECRET.
#
# The per-client HMAC secrets for /v1/event live in concierge.api_clients
# (rotated via UPDATE), not as wrangler secrets.
