name = "concierge-cron"
main = "index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Cron-triggered worker that pulls each enabled user's recent state, asks the
# LLM to compose ONE short ADHD-aware question, and delivers it via Web Push
# (forwarded to inbox-api) + the today dashboard.  Runs every 30 minutes.
[triggers]
crons = ["*/30 * * * *"]

# Shares the Hyperdrive binding with concierge-web + concierge-api.
# Hyperdrive → Hetzner Postgres `allenlabs` DB, `concierge` schema.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

[vars]
APP_NAME = "Concierge Cron"
INBOX_API_URL = "https://inbox-api.allenlabs.org"
# Hard ceiling on users processed per invocation so a stuck job can't
# hammer the LLM or PG.  Tune as needed.
CRON_MAX_USERS = "100"

# Secrets — set with `wrangler secret put … --config workers/cron/wrangler.toml`:
#   OTEL_BEARER_TOKEN
#   OTEL_ACCESS_ID
#   OTEL_ACCESS_SECRET
#   LLM_BASE_URL          e.g. https://api.openai.com/v1
#                         TODO(litellm): once local LiteLLM at
#                         127.0.0.1:4000 is exposed via cloudflared tunnel,
#                         rotate to https://llm.allen.company/v1 — no
#                         code change needed.
#   LLM_API_KEY           OpenAI / LiteLLM bearer token
#   LLM_MODEL             e.g. gpt-4o-mini
#   INBOX_HMAC_SECRET     optional — shared secret with inbox-api so cron can
#                         enqueue a push.  If unset, push channel is skipped
#                         and the nudge only lands on the today dashboard.
#   INBOX_HMAC_CLIENT_ID  the X-Client-Id header value paired with INBOX_HMAC_SECRET.
