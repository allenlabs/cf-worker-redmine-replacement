name = "pm-web"
main = "app/server.tsx"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# `npm run build` (vite + @cloudflare/vite-plugin) emits the worker bundle.
# The plugin reads this `main` field as the SSR source.
assets = { directory = "../../dist/client", binding = "ASSETS" }

# D1 database — shared with the cleanup worker (see workers/cleanup/wrangler.toml).
# Run `wrangler d1 create project_management` once and paste the id in BOTH
# wrangler.toml files.
[[d1_databases]]
binding = "DB"
database_name = "project_management"
database_id = "REPLACE_ME_AFTER_wrangler_d1_create_project_management"
migrations_dir = "../../drizzle"

# KV namespace for session revocation and short-lived caches.
[[kv_namespaces]]
binding = "SESSION_KV"
id = "REPLACE_ME_AFTER_wrangler_kv_namespace_create"

# R2 bucket for issue/wiki attachments — also shared with the cleanup worker.
[[r2_buckets]]
binding = "FILES"
bucket_name = "pm-files"

# Secrets — set via `wrangler secret put <NAME> --config workers/web/wrangler.toml`
#   JWT_SECRET                 (required)
#   GITHUB_OAUTH_CLIENT_ID     (optional, for GitHub login)
#   GITHUB_OAUTH_CLIENT_SECRET (optional, for GitHub login)
#   PUBLIC_BASE_URL            (e.g. https://pm.example.com)

[vars]
APP_NAME = "Project Management"
ALLOW_REGISTRATION = "true"
DEFAULT_LANGUAGE = "en"
ATTACHMENT_TTL_DAYS = "365"
