name = "pm-web"
# `npm run build` (TanStack Start vite plugin) emits the complete worker
# at dist/server/server.js with all server-fn handlers registered.
# We bypass @cloudflare/vite-plugin entirely — its parallel pm_web/
# bundle ships a stub `getServerFnById` (returns undefined for every id)
# so every POST /_serverFn/<hash> 500'd.  TanStack Start's own server
# bundle has the real resolver.
main = "../../dist/server/server.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

assets = { directory = "../../dist/client", binding = "ASSETS" }

# Custom domain — DNS + SSL handled by Cloudflare since allenlabs.org is on
# the same account.  Workers will create the DNS record automatically.
[[routes]]
pattern = "projects.allenlabs.org"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB, `pm` schema).
# Shared with the cleanup worker (see workers/cleanup/wrangler.toml).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

# KV namespace for session revocation + JWKS / one-shot caches.
[[kv_namespaces]]
binding = "SESSION_KV"
id = "96408ec81e754c36b4ae3643cf2afd80"

# R2 bucket for issue/wiki attachments — shared with the cleanup worker.
[[r2_buckets]]
binding = "FILES"
bucket_name = "projects-allenlabs-files"

[vars]
APP_NAME = "Project Management"
DEFAULT_LANGUAGE = "en"
ATTACHMENT_TTL_DAYS = "365"
AUTH_WEB_URL = "https://auth.allen.company"
AUTH_API_URL = "https://auth-api.allen.company"
PUBLIC_BASE_URL = "https://projects.allenlabs.org"
