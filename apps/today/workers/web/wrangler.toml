name = "today-web"
# `npm run build` (TanStack Start vite plugin) emits the complete worker
# at dist/server/server.js with all server-fn handlers registered.  We
# bypass @cloudflare/vite-plugin entirely (same rationale as PM / inbox /
# focus).
main = "../../dist/server/server.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

assets = { directory = "../../dist/client", binding = "ASSETS" }

# Custom domain — DNS + SSL handled by Cloudflare since allenlabs.org is on
# the same account.  Workers will create the DNS record automatically on
# first deploy with custom_domain = true.
[[routes]]
pattern = "today.allenlabs.org"
custom_domain = true

# Hyperdrive → Hetzner Postgres (`allenlabs` DB).  Today is a read-only
# aggregator over pm.*, inbox.*, focus.* — no schema of its own.  Reuses
# the shared Hyperdrive binding id (same Hyperdrive instance, search path
# unscoped so cross-schema reads work without qualifying).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "0b76cf08a44443d39d12f0d51ed059f5"

# KV namespace for session revocation.  Reuse the shared SESSION_KV — keys
# are prefixed by hash so cross-app collisions are astronomically unlikely.
[[kv_namespaces]]
binding = "SESSION_KV"
id = "96408ec81e754c36b4ae3643cf2afd80"

[vars]
APP_NAME = "Today"
DEFAULT_LANGUAGE = "en"
AUTH_WEB_URL = "https://auth.allen.company"
AUTH_API_URL = "https://auth-api.allen.company"
PUBLIC_BASE_URL = "https://today.allenlabs.org"
