name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests + v8 coverage (node + jsdom projects)
        run: npm run test:coverage

      - name: Wrangler integration tests (workers project / miniflare)
        run: npm run test:workers

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
